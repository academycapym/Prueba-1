<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movistar - Dashboard & Academia Nacional</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { movistar: { blue: '#019DF4', dark: '#0B2739', green: '#5CB615', grey: '#86888C', light: '#F6F6F6', red: '#E63780' } },
                    fontFamily: { sans: ['Telefonica', 'Montserrat', 'Segoe UI', 'sans-serif'], }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F6F6F6; color: #0B2739; }
        .modal-overlay { background-color: rgba(11, 39, 57, 0.8); backdrop-filter: blur(8px); }
        .ai-gradient { background: linear-gradient(135deg, #019DF4 0%, #5CB615 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="file"] { display: none; } 
        .tab-btn { padding: 12px 20px; font-size: 13px; font-weight: 700; cursor: pointer; border-bottom: 4px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-active { border-bottom-color: #5CB615; color: #5CB615; background: #fff; }
        .tab-inactive { color: #86888C; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7jT_0uOIW17wrkqqar97WZdc8qvuoKGI",
            authDomain: "academia-capym.firebaseapp.com",
            projectId: "academia-capym",
            storageBucket: "academia-capym.firebasestorage.app",
            messagingSenderId: "261815103883",
            appId: "1:261815103883:web:aa66d0b8d1b733195bff8e",
            measurementId: "G-YZVF86MR63"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- BANCOS DE PREGUNTAS (Siguen igual) ---
        const BANK_BASICO = [
            { q: "¿Cuál es el objetivo principal de la Portabilidad?", options: ["Conservar el número actual al cambiar de compañía.", "Tener un número temporal.", "Dar de baja la línea.", "Fusionar saldos."], ans: 0 },
            { q: "¿Quién está autorizado para solicitar la portabilidad?", options: ["Cualquier familiar.", "El titular de la línea con identificación.", "El promotor.", "Quien tenga el chip físico."], ans: 1 },
            { q: "¿Cuál es la vigencia del NIP de Portabilidad?", options: ["24 horas.", "5 días hábiles.", "15 días.", "5 días naturales."], ans: 3 },
            { q: "¿Qué organismo regula el proceso y valida los datos?", options: ["Operador Receptor.", "Operador Donador.", "El ABD (Administrador de Base de Datos).", "Back Office."], ans: 2 },
            { q: "¿Qué significa FVC?", options: ["Firma de Validación.", "Fecha de Ventana de Cambio.", "Formulario de Venta.", "Folio Comercial."], ans: 1 },
            { q: "¿Cuántos dígitos componen el número de serie (ICC) de la SIM?", options: ["10 dígitos.", "15 dígitos.", "19 dígitos.", "13 caracteres."], ans: 2 },
            { q: "Si ingresas la CURP en Datos Personales, ¿qué paso te ahorras?", options: ["Ingresar el NIP.", "Aprobación automática.", "Tomar fotos de la Identificación Oficial.", "Escanear el ICC."], ans: 2 },
            { q: "Si el número pertenece a una Persona Moral (empresa), ¿qué ocurre?", options: ["Tarda 48 horas más.", "El ABD rechaza el trámite.", "Pide el acta constitutiva.", "Pasa normal."], ans: 1 },
            { q: "En la App, ¿qué dominio debes seleccionar al iniciar sesión?", options: ["Externo.", "Local.", "Movistar.", "Red_Prepago."], ans: 1 },
            { q: "Trámite 'Rechazado por ABD' por NIP incorrecto. ¿Qué haces?", options: ["Mandar correo para cancelar.", "Pedir nuevo NIP y usar 'Reinyección'.", "Crear trámite nuevo.", "Reiniciar el teléfono."], ans: 1 },
            { q: "Para cancelar un proceso por arrepentimiento, ¿cuándo debe hacerse?", options: ["Después de la FVC.", "Antes de la FVC enviando carta e ID por correo.", "Con un botón en la App.", "Dejando de recargar."], ans: 1 },
            { q: "¿Qué significa 'Rechazada por el Back Office'?", options: ["Trámite cancelado.", "Error visual en fotos de identificación, reinyectar.", "El cliente no contestó la llamada.", "NIP expirado."], ans: 1 }
        ];

        const BANK_EXPERTO = [
            { q: "Error 'Code: 3059' o 'SYS001001'. ¿Qué significa?", options: ["El número ya está en otro proceso. Esperar al 6to día.", "El NIP es incorrecto.", "El chip está dañado.", "La línea está suspendida."], ans: 0 },
            { q: "Si el ABD rechaza por 'NIP inexistente o incorrecto', ¿qué debes hacer?", options: ["Usar el menú de 'Reinyección' para modificarlo.", "Crear portabilidad desde cero.", "Mandar correo.", "Esperar 24 horas."], ans: 0 },
            { q: "¿Qué significa el estado 'En espera de envío' en Ónix?", options: ["En revisión por parte del BO Prepago.", "ABD validando NIP.", "Esperando recarga.", "Portabilidad ejecutada."], ans: 0 },
            { q: "Cliente presenta 'Servicio de las dos compañías'. ¿Acción?", options: ["Escalar a 2L indicando ID proveedor, IDPV, DN, ICC.", "Recargar $50.", "Esperar 24 hrs.", "Reinyectar."], ans: 0 }
        ];

        const BANK_VENTAS = [
            { q: "¿Cuál es el objetivo principal de la Venta Consultiva?", options: ["Descubrir la necesidad real del cliente para ofrecer la solución ideal.", "Vender el equipo más caro.", "Hablar sin parar.", "Despachar rápido."], ans: 0 },
            { q: "¿Qué es una característica de un producto?", options: ["Un dato técnico (ej. Batería de 5000 mAh).", "El uso que se le da.", "La ventaja frente a la competencia.", "El ahorro de dinero."], ans: 0 }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState("OPERACION");
            const [playerName, setPlayerName] = useState("");
            const [dataTEMM, setDataTEMM] = useState([]);
            const [avanceDia, setAvanceDia] = useState("");
            const [dataINV, setDataINV] = useState([]);
            const [isLoadedTEMM, setIsLoadedTEMM] = useState(false);
            const [isLoadedINV, setIsLoadedINV] = useState(false);
            
            // Examen state
            const [quizState, setQuizState] = useState('MENU');
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [timeLeft, setTimeLeft] = useState(180);
            const [quizType, setQuizType] = useState('');
            const [ranking, setRanking] = useState([]);

            const cleanID = (id) => String(id || "").trim().replace(/^0+/, '');

            useEffect(() => {
                const unsub = db.collection("ranking").orderBy("score", "desc").onSnapshot(snap => {
                    setRanking(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            // ==========================================
            // LOGICA MODIFICADA DE CARGA TEMM
            // ==========================================
            const handleUploadTEMM = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    // Buscar la pestaña "seg diario" o similar
                    const sheetName = workbook.SheetNames.find(s => s.toLowerCase().includes("seg di"));
                    if (!sheetName) return alert("No se encontró la pestaña 'seg diario'");
                    
                    const sheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: "A", defval: "" });

                    // 1. Obtener avance desde F3 (Fila 3 es índice 2 en el array json con header A)
                    if (json[2] && json[2]["F"]) {
                        setAvanceDia(json[2]["F"]);
                    }

                    // 2. Mapear filas 6 a 48 (Índices 5 a 47)
                    const parsed = [];
                    for (let i = 5; i <= 47; i++) {
                        const row = json[i];
                        if (row && row["I"]) { // Si hay IDPDV
                            const altas = Math.round(Number(row["Q"]) || 0);
                            const cuota = Math.round(Number(row["R"]) || 0);
                            const alcance = cuota > 0 ? Math.round((altas / cuota) * 100) : 0;
                            const gap = Math.round(altas - cuota);

                            parsed.push({
                                idpdv: cleanID(row["I"]),
                                tienda: String(row["J"]).trim(),
                                altas: altas,
                                cuota: cuota,
                                alcance: alcance,
                                gap: gap
                            });
                        }
                    }

                    setDataTEMM(parsed);
                    setIsLoadedTEMM(true);
                };
                reader.readAsBinaryString(file);
            };

            const handleUploadINV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames.find(s => s.toLowerCase().includes("tiendas"))];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: "A", defval: "" });
                    setDataINV(json.filter(r => r["I"]).map(r => ({
                        idpdv: cleanID(r["I"]), modelo: r["T"], marca: r["U"], stock: parseInt(r["AG"] || 0)
                    })));
                    setIsLoadedINV(true);
                };
                reader.readAsBinaryString(file);
            };

            // Quiz Logic
            useEffect(() => {
                let timer = null;
                if (quizState === 'PLAYING' && timeLeft > 0) timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                else if (quizState === 'PLAYING' && timeLeft === 0) setQuizState('RESULTS');
                return () => clearInterval(timer);
            }, [quizState, timeLeft]);

            const startQuiz = (type) => {
                if (!playerName.trim()) return alert("Ingresa tu nombre completo.");
                setQuizType(type);
                let bank = type === 'BASICO' ? BANK_BASICO : (type === 'EXPERTO' ? BANK_EXPERTO : BANK_VENTAS);
                const qCount = type === 'BASICO' ? 12 : (type === 'EXPERTO' ? 20 : 15);
                setQuizQuestions(bank.sort(() => 0.5 - Math.random()).slice(0, qCount).map(q => ({
                    ...q, displayOptions: q.options.map((opt, i) => ({ text: opt, idx: i })).sort(() => 0.5 - Math.random())
                })));
                setCurrentQIndex(0); setUserAnswers([]); setTimeLeft(180); setQuizState('PLAYING');
            };

            const handleAnswer = (idx) => {
                const newAnswers = [...userAnswers, idx];
                setUserAnswers(newAnswers);
                if (currentQIndex < quizQuestions.length - 1) setCurrentQIndex(currentQIndex + 1);
                else {
                    const score = quizQuestions.reduce((acc, q, i) => acc + (newAnswers[i] === q.ans ? 1 : 0), 0);
                    db.collection("ranking").add({ name: playerName, type: quizType, score, date: new Date().toISOString() });
                    setQuizState('RESULTS');
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <header className="bg-movistar-dark text-white p-4 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold">Portal <span className="text-movistar-blue">CAPyM</span></h1>
                            <div className="text-sm font-semibold bg-movistar-blue/20 px-3 py-1 rounded-full text-movistar-blue">LÍDER NACIONAL</div>
                        </div>
                    </header>

                    <div className="bg-white shadow-sm overflow-x-auto hide-scrollbar flex border-b border-gray-200">
                        <button onClick={() => setActiveTab("CAPACITACION")} className={`tab-btn ${activeTab === "CAPACITACION" ? "tab-active" : "tab-inactive"}`}>ACADEMIA</button>
                        <button onClick={() => setActiveTab("OPERACION")} className={`tab-btn ${activeTab === "OPERACION" ? "tab-active" : "tab-inactive"}`}>OPERACIÓN</button>
                        <button onClick={() => setActiveTab("INVENTARIO")} className={`tab-btn ${activeTab === "INVENTARIO" ? "tab-active" : "tab-inactive"}`}>INVENTARIO</button>
                    </div>

                    <main className="flex-grow p-4 max-w-7xl mx-auto w-full">
                        {activeTab === "OPERACION" && (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                    <h2 className="text-lg font-bold mb-3 flex items-center gap-2">
                                        <span className="w-2 h-6 bg-movistar-blue rounded-full"></span>
                                        Seguimiento Diario TEMM
                                    </h2>
                                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100">
                                        <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                            <p className="mb-2 text-sm text-gray-500"><span className="font-semibold text-movistar-blue">Subir archivo</span> detalle diario</p>
                                        </div>
                                        <input type="file" onChange={handleUploadTEMM} />
                                    </label>
                                </div>

                                {isLoadedTEMM && (
                                    <div className="space-y-4">
                                        {/* LEYENDA DE AVANCE */}
                                        <div className="bg-movistar-blue text-white p-4 rounded-xl shadow-md flex justify-between items-center">
                                            <span className="text-sm font-bold uppercase tracking-wider">avance hasta el día:</span>
                                            <span className="text-3xl font-black">{avanceDia}</span>
                                        </div>

                                        {/* GRILLA DE TIENDAS */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {dataTEMM.map((item, idx) => (
                                                <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-[10px] font-bold text-gray-400">ID: {item.idpdv}</span>
                                                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${item.alcance >= 100 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                            {item.alcance}%
                                                        </span>
                                                    </div>
                                                    <h3 className="font-bold text-sm mb-3 truncate">{item.tienda}</h3>
                                                    <div className="grid grid-cols-3 gap-2 text-center">
                                                        <div className="bg-gray-50 p-2 rounded-lg">
                                                            <div className="text-[10px] text-gray-500">ALTAS</div>
                                                            <div className="font-bold text-lg">{item.altas}</div>
                                                        </div>
                                                        <div className="bg-gray-50 p-2 rounded-lg">
                                                            <div className="text-[10px] text-gray-500">CUOTA</div>
                                                            <div className="font-bold text-lg">{item.cuota}</div>
                                                        </div>
                                                        <div className={`p-2 rounded-lg ${item.gap >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                                            <div className="text-[10px]">GAP</div>
                                                            <div className="font-bold text-lg">{item.gap}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === "CAPACITACION" && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                                    <h2 className="text-2xl font-black mb-2 ai-gradient">EXAMEN DE CERTIFICACIÓN</h2>
                                    <input 
                                        type="text" 
                                        placeholder="Nombre Completo" 
                                        className="w-full p-4 rounded-xl border-2 border-gray-100 mb-4 text-center font-bold"
                                        value={playerName}
                                        onChange={(e) => setPlayerName(e.target.value)}
                                    />
                                    <div className="grid grid-cols-1 gap-3">
                                        <button onClick={() => startQuiz('BASICO')} className="bg-movistar-blue text-white p-4 rounded-xl font-bold shadow-lg shadow-b
