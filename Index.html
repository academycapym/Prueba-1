        const App = () => {
            const [userRole, setUserRole] = useState("MAESTRO"); 
            const [activeTab, setActiveTab] = useState("CAPACITACION"); 
            const [playerName, setPlayerName] = useState("");
            
            // Operación
            const [dataTEMM, setDataTEMM] = useState([]);
            const [dataINV, setDataINV] = useState([]);
            const [isLoadedTEMM, setIsLoadedTEMM] = useState(false);
            const [isLoadedINV, setIsLoadedINV] = useState(false);
            
            // Filtros Operación
            const [supFilter, setSupFilter] = useState("Todos");
            const [cadFilter, setCadFilter] = useState("Todas");
            const [sortOrder, setSortOrder] = useState("gap_desc");
            const [marcaFilter, setMarcaFilter] = useState("Todas");
            const [modeloFilter, setModeloFilter] = useState("Todos");

            // Examen
            const [quizState, setQuizState] = useState('MENU'); 
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [timeLeft, setTimeLeft] = useState(180); 
            const [quizType, setQuizType] = useState(''); 
            const [ranking, setRanking] = useState([]);

            const cleanID = (id) => String(id || "").trim().replace(/^0+/, '');

            // ==========================================
            // FIREBASE LÓGICA (RANKING)
            // ==========================================
            useEffect(() => {
                const unsub = db.collection("ranking").orderBy("score", "desc").onSnapshot(snap => {
                    setRanking(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, []);

            // ==========================================
            // EXCEL LOGIC (Resumido)
            // ==========================================
            const handleUploadTEMM = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames.find(s => s.toLowerCase().includes("seg diario"))];
                    if (!sheet) return;
                    const json = XLSX.utils.sheet_to_json(sheet, { header: "A", defval: "" });
                    const parsed = json.filter(row => row["J"] && row["J"].length > 2 && !row["J"].includes("PDV")).map(row => ({
                        idpdv: cleanID(row["I"]), tienda: String(row["J"]).trim(), supervisor: String(row["B"]).trim(), cadena: String(row["L"]).toUpperCase().includes("EKT") ? "ELEKTRA" : (String(row["L"]).toUpperCase().includes("COPPEL") ? "COPPEL" : "SUBURBIA"),
                        altas: Math.round(row["Q"] || 0), cuota: Math.round(row["R"] || 0), gap: Math.round(row["S"] || 0)
                    }));
                    setDataTEMM(parsed); setIsLoadedTEMM(true);
                };
                reader.readAsBinaryString(file);
            };

            const handleUploadINV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames.find(s => s.toLowerCase().includes("tiendas"))];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: "A", defval: "" });
                    setDataINV(json.filter(r => r["I"]).map(r => ({
                        idpdv: cleanID(r["I"]), modelo: r["T"], marca: r["U"], statusSku: r["W"], stock: parseInt(r["AG"] || 0), statusTienda: r["K"]
                    })));
                    setIsLoadedINV(true);
                };
                reader.readAsBinaryString(file);
            };

            // ==========================================
            // QUIZ LOGIC
            // ==========================================
            useEffect(() => {
                let timer = null;
                if (quizState === 'PLAYING' && timeLeft > 0) timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                else if (quizState === 'PLAYING' && timeLeft === 0) setQuizState('RESULTS');
                return () => clearInterval(timer);
            }, [quizState, timeLeft]);

            const startQuiz = (type) => {
                if (!playerName.trim()) return alert("Ingresa tu nombre completo para iniciar.");
                setQuizType(type);
                let bank = type === 'BASICO' ? BANK_BASICO : (type === 'EXPERTO' ? BANK_EXPERTO : BANK_VENTAS);
                const qCount = type === 'BASICO' ? 12 : (type === 'EXPERTO' ? 20 : 15);
                const shuffled = bank.sort(() => 0.5 - Math.random()).slice(0, qCount).map(q => ({
                    ...q, displayOptions: q.options.map((opt, i) => ({ text:
